version: "3.8"

x-simulation_il_volumes: &simulation_il_volumes
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - ${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:rw
  - ${MONO_DIR}:/workspace/humanoid:rw
  - /dev:/dev
  - /run/udev:/run/udev:ro
  - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface:rw
  - ${ISAAC_SIM_CACHE_DIR}/cache/kit:/isaac-sim/kit/cache:rw
  - ${ISAAC_SIM_CACHE_DIR}/cache/ov:/root/.cache/ov:rw
  - ${ISAAC_SIM_CACHE_DIR}/cache/pip:/root/.cache/pip:rw
  - ${ISAAC_SIM_CACHE_DIR}/cache/glcache:/root/.cache/nvidia/GLCache:rw
  - ${ISAAC_SIM_CACHE_DIR}/cache/computecache:/root/.nv/ComputeCache:rw
  - ${ISAAC_SIM_CACHE_DIR}/logs:/root/.nvidia-omniverse/logs:rw
  - ${ISAAC_SIM_CACHE_DIR}/data:/root/.local/share/ov/data:rw
  - ${MONO_DIR}/autonomy/teleop/quest_teleop/certs:/certs:ro

x-simulation_il_env: &simulation_il_env
  - ACCEPT_EULA=Y
  - PRIVACY_CONSENT=Y
  - NVIDIA_VISIBLE_DEVICES=all
  - NVIDIA_DRIVER_CAPABILITIES=all
  - DISPLAY=${DISPLAY}
  - QT_X11_NO_MITSHM=1
  - TELEOP_PORT=${TELEOP_PORT:-/dev/ttyACM0}
  - TELEOP_ID=${TELEOP_ID:-leader_arm_1}

services:
  simulation_il:
    build: &simulation_il_build
      context: ..
      dockerfile: docker/simulation/isaac_il/isaac_il.Dockerfile
      cache_from:
        - "${SIMULATION_IL_IMAGE:?}:${TAG}"
        - "${SIMULATION_IL_IMAGE:?}:main"
    image: "${SIMULATION_IL_IMAGE:?}:${TAG}"
    privileged: true
    gpus: all
    environment: *simulation_il_env
    profiles: [deploy]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes: *simulation_il_volumes
    network_mode: host
    stdin_open: true
    tty: true
    command: sleep infinity

  simulation_il_dev:
    build: *simulation_il_build
    image: "${SIMULATION_IL_IMAGE:?}:dev_${TAG}"
    privileged: true
    gpus: all
    environment: *simulation_il_env
    profiles: [develop]
    volumes: *simulation_il_volumes
    network_mode: host
    stdin_open: true
    tty: true
    command: sleep infinity
