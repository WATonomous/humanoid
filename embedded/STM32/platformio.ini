; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = app

[env:nucleo_g474re]
platform = ststm32
board = nucleo_g474re
framework = arduino
upload_protocol = stlink
board_build.f_cpu = 170000000L
monitor_speed = 115200
monitor_filters =
	debug
	send_on_enter
lib_archive = false
monitor_dtr = 1
lib_deps =
	SPI
	Wire
	math
	simplefoc/SimpleFOCDrivers@^1.0.8
	askuric/Simple FOC@^2.3.4

build_flags =
	-Wl,-Map,firmware.map
	; Use the Nucleo ST-LINK virtual COM port for Serial output.
	-D HSE_VALUE=4800000U
	-D HAL_FDCAN_MODULE_ENABLED
	-D USE_HAL_DRIVER

	-Wl,--undefined,_printf_float
	-Wl,--undefined,_printf_double
	-Wl,--undefined,_printf_char
	-Isrc
	-Isrc/Drivers

[env:bootloader]
platform = ststm32
board = nucleo_g474re
framework = stm32cube
build_src_filter = +<../bootloader/> -<*>
board_build.ldscript = $PROJECT_DIR/bootloader/src/linkerscript.ld
extra_scripts = pre:rename_bin.py
	linker_flags.py
build_flags =
	-mfloat-abi=hard
	-mfpu=fpv4-sp-d16
	-Wl,-Map,bootloader.map

[env:app]
platform = ststm32
board = nucleo_g474re
framework = arduino
upload_protocol = stlink
board_build.f_cpu = 170000000L
monitor_speed = 115200
lib_archive = false
monitor_dtr = 1
lib_deps =
	SPI
	Wire
	math
	simplefoc/SimpleFOCDrivers@^1.0.8
	askuric/Simple FOC@^2.3.4
lib_ignore = FreeRTOS-Kernel
build_src_filter = +<../app/src/foc.cpp> -<*>
build_flags =
	-Wl,-Map,app.map
	; Use the Nucleo ST-LINK virtual COM port for Serial output.
	-D HSE_VALUE=4800000U
	-D HAL_FDCAN_MODULE_ENABLED
	-D USE_HAL_DRIVER
	-Wl,--undefined,_printf_float
	-Wl,--undefined,_printf_double
	-Wl,--undefined,_printf_char
	-Isrc
	-Isrc/Drivers
