left:
  shoulder:
    pitch:                  # up/down arm movement
      can_id: 0x01
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:                   # rotation along arm axis
      can_id: 0x02
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    yaw:                    # left/right arm movement
      can_id: 0x03
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true

  elbow:
    pitch:                  # forearm up/down
      can_id: 0x04
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:                  # forearm rotation
      can_id: 0x05
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true

  wrist:
    pitch:                  # wrist up/down
      can_id: 0x06
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true

  gripper:
    open_close:
      can_id: 0x07
      lower_limit: 0        # fully closed
      upper_limit: 100      # fully open (%)
      direction: 1
      zero_offset: 0
      limit_range: true

