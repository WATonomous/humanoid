<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest Teleop</title>
  </head>
  <body>
    <h1>Quest Teleop</h1>
    <button id="start">Start</button>
    <pre id="status">Not connected</pre>

    <canvas id="xr-canvas" style="display:none;"></canvas>

    <script>
      const status = document.getElementById("status");

      const JOINTS = [
        "wrist",

        "thumb-metacarpal",
        "thumb-phalanx-proximal",
        "thumb-phalanx-distal",
        "thumb-tip",

        "index-finger-metacarpal",
        "index-finger-phalanx-proximal",
        "index-finger-phalanx-intermediate",
        "index-finger-phalanx-distal",
        "index-finger-tip",

        "middle-finger-metacarpal",
        "middle-finger-phalanx-proximal",
        "middle-finger-phalanx-intermediate",
        "middle-finger-phalanx-distal",
        "middle-finger-tip",

        "ring-finger-metacarpal",
        "ring-finger-phalanx-proximal",
        "ring-finger-phalanx-intermediate",
        "ring-finger-phalanx-distal",
        "ring-finger-tip",

        "pinky-finger-metacarpal",
        "pinky-finger-phalanx-proximal",
        "pinky-finger-phalanx-intermediate",
        "pinky-finger-phalanx-distal",
        "pinky-finger-tip"
      ];

      function emptyPose() {
        return {
          position: { x: 0, y: 0, z: 0 },
          orientation: { x: 0, y: 0, z: 0, w: 1 }
        };
      }

      function poseToJson(pose) {
        if (!pose) return emptyPose();

        const t = pose.transform;

        return {
          position: {
            x: t.position.x,
            y: t.position.y,
            z: t.position.z
          },
          orientation: {
            x: t.orientation.x,
            y: t.orientation.y,
            z: t.orientation.z,
            w: t.orientation.w
          }
        };
      }

      // right_hand_joints layout:
      // 0-2: wrist xyz
      // 3-5: thumb-metacarpal xyz
      // 6-8: thumb-phalanx-proximal xyz
      // ...

      function handJointsToArray(hand, frame, refSpace) {
        const values = [];

        for (const jointName of JOINTS) {
          const jointSpace = hand.get(jointName);
          const jointPose = jointSpace ? frame.getJointPose(jointSpace, refSpace) : null;

          if (jointPose) {
            values.push(
              jointPose.transform.position.x,
              jointPose.transform.position.y,
              jointPose.transform.position.z
            );
          } else {
            values.push(0, 0, 0);
          }
        }

        return values;
      }

      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(shader));
        }

        return shader;
      }

      function createProgram(gl, vertexSource, fragmentSource) {
        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentSource);
        const program = gl.createProgram();

        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          throw new Error(gl.getProgramInfoLog(program));
        }

        return program;
      }

      function createPointRenderer(gl) {
        const program = createProgram(
          gl,
          `
            attribute vec3 aPosition;
            uniform mat4 uProjection;
            uniform mat4 uView;
            uniform float uPointSize;

            void main() {
              gl_Position = uProjection * uView * vec4(aPosition, 1.0);
              gl_PointSize = uPointSize;
            }
          `,
          `
            precision mediump float;
            uniform vec4 uColor;

            void main() {
              vec2 p = gl_PointCoord - vec2(0.5);
              if (length(p) > 0.5) {
                discard;
              }
              gl_FragColor = uColor;
            }
          `
        );

        return {
          program,
          buffer: gl.createBuffer(),
          aPosition: gl.getAttribLocation(program, "aPosition"),
          uProjection: gl.getUniformLocation(program, "uProjection"),
          uView: gl.getUniformLocation(program, "uView"),
          uPointSize: gl.getUniformLocation(program, "uPointSize"),
          uColor: gl.getUniformLocation(program, "uColor")
        };
      }

      // ── POV quad (stereo both-arms overview camera feed) ─────────────────
      // Drawn HUD-locked (eye-space only, no view matrix) so it's always
      // visible regardless of head orientation -- a floating picture-in-
      // picture panel, not a world-anchored object. Full-screen sized (not a
      // small corner panel) so it reads as an immersive view, not a window.
      // TWO textures (left/right eye), each refreshed from its own static
      // file (/pov_left.png, /pov_right.png) that run_quest_bimanual_teleop.py
      // overwrites ~10x/sec by capturing two IPD-separated Kit viewports that
      // follow your real head pose (see head_pose in the WS payload below and
      // _EYE_CAMERA_* in that script) -- real stereo depth + head-tracked
      // look-around, not a flat mono image. webxr_server.py serves both
      // files with zero server-side changes, same as the old single-eye
      // panel.
      function createQuadRenderer(gl) {
        const program = createProgram(
          gl,
          `
            attribute vec2 aPosition;
            attribute vec2 aTexCoord;
            uniform mat4 uProjection;
            uniform float uQuadZ;
            varying vec2 vTexCoord;

            void main() {
              gl_Position = uProjection * vec4(aPosition, uQuadZ, 1.0);
              vTexCoord = aTexCoord;
            }
          `,
          `
            precision mediump float;
            varying vec2 vTexCoord;
            uniform sampler2D uTexture;

            void main() {
              gl_FragColor = texture2D(uTexture, vTexCoord);
            }
          `
        );

        const posBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1.1, -0.825, 1.1, -0.825, -1.1, 0.825, 1.1, 0.825]),
          gl.STATIC_DRAW
        );

        const texBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, texBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 1, 1, 1, 0, 0, 1, 0]), gl.STATIC_DRAW);

        return {
          program,
          aPosition: gl.getAttribLocation(program, "aPosition"),
          aTexCoord: gl.getAttribLocation(program, "aTexCoord"),
          posBuffer,
          texCoordBuffer: texBuffer,
          uProjection: gl.getUniformLocation(program, "uProjection"),
          uQuadZ: gl.getUniformLocation(program, "uQuadZ"),
          uTexture: gl.getUniformLocation(program, "uTexture")
        };
      }

      function createEyeTexture(gl) {
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        // Placeholder 1x1 opaque-black pixel until the first frame loads, so
        // the quad doesn't sample from an uninitialized texture (undefined
        // behaviour / driver-dependent garbage on some WebGL implementations).
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));
        return texture;
      }

      function drawPovQuad(gl, renderer, projectionMatrix, texture) {
        gl.useProgram(renderer.program);

        gl.bindBuffer(gl.ARRAY_BUFFER, renderer.posBuffer);
        gl.enableVertexAttribArray(renderer.aPosition);
        gl.vertexAttribPointer(renderer.aPosition, 2, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, renderer.texCoordBuffer);
        gl.enableVertexAttribArray(renderer.aTexCoord);
        gl.vertexAttribPointer(renderer.aTexCoord, 2, gl.FLOAT, false, 0, 0);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.uniform1i(renderer.uTexture, 0);

        gl.uniformMatrix4fv(renderer.uProjection, false, projectionMatrix);
        gl.uniform1f(renderer.uQuadZ, -1.5);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        gl.disable(gl.BLEND);
      }

      function drawHandPoints(gl, renderer, values, projectionMatrix, viewMatrix, color) {
        if (!values || values.length !== 75) return;

        gl.useProgram(renderer.program);
        gl.bindBuffer(gl.ARRAY_BUFFER, renderer.buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(values), gl.DYNAMIC_DRAW);

        gl.enableVertexAttribArray(renderer.aPosition);
        gl.vertexAttribPointer(renderer.aPosition, 3, gl.FLOAT, false, 0, 0);

        gl.uniformMatrix4fv(renderer.uProjection, false, projectionMatrix);
        gl.uniformMatrix4fv(renderer.uView, false, viewMatrix);
        gl.uniform1f(renderer.uPointSize, 14.0);
        gl.uniform4fv(renderer.uColor, color);

        gl.drawArrays(gl.POINTS, 0, 25);
      }

      document.getElementById("start").onclick = async () => {
        const wsUrl = `wss://${window.location.hostname}:9090`;
        const ws = new WebSocket(wsUrl);

        status.textContent = `Connecting to ${wsUrl}`;

        ws.onopen = async () => {
          status.textContent = "WSS connected. Starting WebXR...";

          const useAr = await navigator.xr.isSessionSupported("immersive-ar");
          const sessionMode = useAr ? "immersive-ar" : "immersive-vr";

          const session = await navigator.xr.requestSession(sessionMode, {
            requiredFeatures: ["hand-tracking"]
          });

          const canvas = document.getElementById("xr-canvas"); //needed for scene and getting pose data
          const gl = canvas.getContext("webgl", {
            xrCompatible: true,
            alpha: true
          });
          const pointRenderer = createPointRenderer(gl);
          const quadRenderer = createQuadRenderer(gl);
          const leftEyeTexture = createEyeTexture(gl);
          const rightEyeTexture = createEyeTexture(gl);

          // Periodically fetch both eyes' latest POV frames and stash them;
          // the actual gl.texImage2D upload happens once in onFrame (not
          // here) since WebGL calls must happen on the frame that has the XR
          // context bound -- this loop just keeps decoded ImageBitmaps ready.
          let pendingLeftBitmap = null;
          let pendingRightBitmap = null;
          async function refreshPovTexture(path, setPending) {
            try {
              const res = await fetch(`${path}?t=${Date.now()}`, { cache: "no-store" });
              if (!res.ok) return;
              const blob = await res.blob();
              setPending(await createImageBitmap(blob));
            } catch (e) {
              // Transient fetch/decode failure (frame not written yet, network
              // hiccup) -- next interval tick retries, nothing to do here.
            }
          }
          const povFetchInterval = setInterval(() => {
            refreshPovTexture("/pov_left.png", (bmp) => { pendingLeftBitmap = bmp; });
            refreshPovTexture("/pov_right.png", (bmp) => { pendingRightBitmap = bmp; });
          }, 200);
          session.addEventListener("end", () => clearInterval(povFetchInterval));

          session.updateRenderState({
            baseLayer: new XRWebGLLayer(session, gl, {
              alpha: true
            })
          });

          const refSpace = await session.requestReferenceSpace("local");

          function onFrame(time, frame) {
            session.requestAnimationFrame(onFrame);

            const payload = {
              left_wrist: emptyPose(),
              right_wrist: emptyPose(),
              left_hand_joints: Array(75).fill(0),
              right_hand_joints: Array(75).fill(0),
              head_pose: emptyPose()
            };

            for (const inputSource of session.inputSources) {
              if (!inputSource.hand) continue;

              const wristSpace = inputSource.hand.get("wrist");
              const wristPose = wristSpace ? frame.getJointPose(wristSpace, refSpace) : null;

              if (inputSource.handedness === "left") {
                payload.left_wrist = poseToJson(wristPose);
                payload.left_hand_joints = handJointsToArray(inputSource.hand, frame, refSpace);
              }

              if (inputSource.handedness === "right") {
                payload.right_wrist = poseToJson(wristPose);
                payload.right_hand_joints = handJointsToArray(inputSource.hand, frame, refSpace);
              }
            }

            if (pendingLeftBitmap) {
              gl.bindTexture(gl.TEXTURE_2D, leftEyeTexture);
              gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, pendingLeftBitmap);
              pendingLeftBitmap = null;
            }
            if (pendingRightBitmap) {
              gl.bindTexture(gl.TEXTURE_2D, rightEyeTexture);
              gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, pendingRightBitmap);
              pendingRightBitmap = null;
            }

            const pose = frame.getViewerPose(refSpace);
            if (pose) {
              payload.head_pose = poseToJson(pose);

              gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);
              gl.enable(gl.DEPTH_TEST);
              gl.clearColor(0.0, 0.0, 0.0, useAr ? 0.0 : 1.0);
              gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

              for (const view of pose.views) {
                const viewport = session.renderState.baseLayer.getViewport(view);
                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);

                // view.eye is "left"/"right"/"none" per the WebXR spec -- fall
                // back to the left texture for "none" (mono/AR passthrough
                // frames with a single combined view, no eye separation).
                const eyeTexture = view.eye === "right" ? rightEyeTexture : leftEyeTexture;
                drawPovQuad(gl, quadRenderer, view.projectionMatrix, eyeTexture);

                drawHandPoints(
                  gl,
                  pointRenderer,
                  payload.left_hand_joints,
                  view.projectionMatrix,
                  view.transform.inverse.matrix,
                  [0.1, 1.0, 0.25, 1.0]
                );

                drawHandPoints(
                  gl,
                  pointRenderer,
                  payload.right_hand_joints,
                  view.projectionMatrix,
                  view.transform.inverse.matrix,
                  [0.0, 0.75, 1.0, 1.0]
                );
              }
            }

            if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify(payload));
            }

            status.textContent = `Streaming hand data (${sessionMode})`;
          }

          session.requestAnimationFrame(onFrame);
        };

        ws.onerror = () => {
          status.textContent = "WebSocket error";
        };

        ws.onclose = () => {
          status.textContent = "WebSocket closed";
        };
      };
    </script>
  </body>
</html>
