safety:
  units:
    angle: "deg"
    velocity: "deg_s"

  global:
    enable_position_clamp: true
    enable_velocity_limit: true
    enable_delta_limit: true
    enable_low_pass: true
    velocity_max: 120.0
    delta_max: 2.4
    low_pass_alpha: 0.85

  joints:
    shoulder:
      pitch:
        velocity_max: 100.0
        delta_max: 2.0
      roll:
        velocity_max: 100.0
        delta_max: 2.0
      yaw:
        velocity_max: 100.0
        delta_max: 2.0
    elbow:
      pitch:
        velocity_max: 80.0
        delta_max: 1.6
      roll:
        velocity_max: 80.0
        delta_max: 1.6
    wrist:
      pitch:
        velocity_max: 120.0
        delta_max: 2.4
