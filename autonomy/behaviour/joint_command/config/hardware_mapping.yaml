# 6-DOF arm + 1-DOF gripper. joint_command uses the six arm joints only;
# gripper is kept for future / manual MotorCmd use. Hand DOFs live elsewhere when needed.
left:
  shoulder:
    pitch:
      can_id: 0x0E
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:
      can_id: 0x0C
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    yaw:
      can_id: 0x0D
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
  elbow:
    pitch:
      can_id: 0x0A
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:
      can_id: 0x0B
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true
  wrist:
    pitch:
      can_id: 0x16
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
  gripper:
    open_close:
      can_id: 0x15
      lower_limit: 0
      upper_limit: 100
      direction: 1
      zero_offset: 0
      limit_range: true
 
