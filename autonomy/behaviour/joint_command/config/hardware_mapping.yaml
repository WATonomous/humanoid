# 6-DOF arm + 1-DOF gripper. joint_command uses the six arm joints only;
# gripper is kept for future / manual MotorCmd use. Hand DOFs live elsewhere when needed.
left:
  shoulder:
    pitch:
      can_id: 0x01
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:
      can_id: 0x02
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
    yaw:
      can_id: 0x03
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
  elbow:
    pitch:
      can_id: 0x04
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true
    roll:
      can_id: 0x05
      lower_limit: -130
      upper_limit: 0
      direction: 1
      zero_offset: 0
      limit_range: true
  wrist:
    pitch:
      can_id: 0x06
      lower_limit: -90
      upper_limit: 90
      direction: 1
      zero_offset: 0
      limit_range: true
  gripper:
    open_close:
      can_id: 0x07
      lower_limit: 0
      upper_limit: 100
      direction: 1
      zero_offset: 0
      limit_range: true
