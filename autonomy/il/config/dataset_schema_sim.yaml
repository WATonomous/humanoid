# Isaac Sim keyboard teleop — joint-only validation (no cameras required).
robot_id: humanoid_left_arm_sim_v1
repo_id: humanoid/local_left_arm_sim
fps: 30
state_unit: rad

joint_names:
  - left_shoulder_pitch
  - left_shoulder_roll
  - left_shoulder_yaw
  - left_elbow_pitch
  - left_elbow_roll
  - left_wrist_pitch

images: {}

record:
  root: datasets/record_sim
  use_videos: true
  image_writer_threads: 4
  image_writer_processes: 0
